name = "cahazards"
main = "src/worker.ts"
compatibility_date = "2024-12-01"

[observability]
enabled = true

# [site]
# bucket = "./frontend"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "cahazards-tiles"

[[d1_databases]]
binding = "DB"
database_name = "cahazards-cache"
database_id = "YOUR_D1_DATABASE_ID"
